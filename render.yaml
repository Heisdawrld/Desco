services:
  - type: web
    name: desco-2.0
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    envVarGroups:
      - name: desco-secrets
        envVars:
          - key: TURSO_DATABASE_URL
            sync: false
          - key: TURSO_AUTH_TOKEN
            sync: false
          - key: JWT_SECRET
            sync: false
          - key: ADMIN_PASSWORD_HASH
            sync: false
