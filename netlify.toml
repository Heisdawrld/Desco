[build]
  base = "artifacts/desco"
  command = "pnpm run build"
  publish = "dist/public"
  functions = "../../netlify/functions"

# Proxy API calls to Netlify Functions (must come first!)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
