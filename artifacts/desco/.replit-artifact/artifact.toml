kind = "web"
previewPath = "/"
title = "DESCO 2.0"
version = "1.0.0"
id = "artifacts/desco"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19384

[services.development]
run = "pnpm --filter @workspace/desco run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/desco", "run", "build" ]
publicDir = "artifacts/desco/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19384"
BASE_PATH = "/"
